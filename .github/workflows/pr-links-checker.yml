name: 'PR Docs Link Check'

on:
  pull_request:

jobs:
  check-docs-links:
    uses: albertov19/workflows/.github/workflows/core-pr-link-checker.yml@main
    with:
      mkdocs_repo: albertov19/tanssi-mkdocs
      docs_repo: albertov19/tanssi-docs
      mkdocs_repo_name: tanssi-mkdocs
      docs_repo_name: tanssi-docs
      label: Tanssi
    secrets:
      GH_TOKEN: ${{ secrets.GH_PR_404_CHECKER }}
